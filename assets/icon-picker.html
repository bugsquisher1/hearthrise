<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Hearthrise — Icon Picker</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0f1320;color:#dfe9ee;font-family:system-ui,-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
  /* Left: id list */
  .id-col{width:340px;background:#181d2c;border-right:1px solid #2a3142;display:flex;flex-direction:column}
  .id-col header{padding:12px 14px;border-bottom:1px solid #2a3142}
  .id-col header h1{margin:0 0 6px;font-size:15px;color:#f3d181}
  .id-col header .stats{font-size:11px;color:#9aa3b0}
  .id-col header input{display:block;width:100%;margin-top:8px;padding:6px 10px;background:#0f1320;border:1px solid #2a3142;color:#dfe9ee;border-radius:4px;font-size:12px}
  .id-col header .filters{margin-top:6px;display:flex;gap:4px}
  .id-col header .filter-chip{padding:3px 8px;font-size:10px;background:#0f1320;border:1px solid #2a3142;border-radius:3px;cursor:pointer;color:#9aa3b0}
  .id-col header .filter-chip.active{background:#3a4154;color:#f3d181;border-color:#f3d181}
  .id-list{flex:1;overflow-y:auto;padding:6px}
  .id-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:12px}
  .id-row:hover{background:#222a3e}
  .id-row.selected{background:rgba(243,209,129,.12);border:1px solid rgba(243,209,129,.4)}
  .id-row.changed{border-left:3px solid #5fcc7c}
  .id-row .ir-icon{width:32px;height:32px;background:#0f1320;border:1px solid #2a3142;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .id-row .ir-icon img{max-width:90%;max-height:90%;object-fit:contain}
  .id-row .ir-meta{flex:1;min-width:0}
  .id-row .ir-name{font-weight:700;color:#dfe9ee;font-size:12px}
  .id-row .ir-kind{font-size:9px;color:#9aa3b0;text-transform:uppercase;letter-spacing:.06em}
  /* Right: pack browser */
  .pack-col{flex:1;display:flex;flex-direction:column;background:#0f1320}
  .pack-col header{padding:12px 14px;border-bottom:1px solid #2a3142;display:flex;align-items:center;gap:12px}
  .pack-col header .selected-info{flex:1}
  .pack-col header h2{margin:0;font-size:14px;color:#f3d181}
  .pack-col header .selected-current{margin-top:2px;font-size:11px;color:#9aa3b0}
  .pack-col header select{padding:6px 10px;background:#181d2c;border:1px solid #2a3142;color:#dfe9ee;border-radius:4px;font-size:12px;min-width:280px}
  .pack-grid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;align-content:flex-start}
  .pcell{background:#181d2c;border:1px solid #2a3142;border-radius:4px;padding:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .12s}
  .pcell:hover{border-color:#5fcc7c;transform:translateY(-2px)}
  .pcell.current{border-color:#f3d181;background:rgba(243,209,129,.06)}
  .pcell img{width:48px;height:48px;object-fit:contain}
  .pcell .pl{font-size:9px;color:#9aa3b0}
  /* Footer */
  .footer{position:fixed;bottom:0;right:0;background:#181d2c;border:1px solid #2a3142;padding:10px 14px;border-radius:6px 0 0 0;display:flex;gap:8px;align-items:center;font-size:12px}
  .footer button{padding:5px 12px;background:#f3d181;color:#0f1320;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-size:12px}
  .footer .changes{color:#5fcc7c;font-weight:700}
</style>
</head><body>
<div class="id-col">
  <header>
    <h1>Hearthrise — Icon Picker</h1>
    <div class="stats" id="stats"></div>
    <input type="text" id="filter" placeholder="Filter by id or name…" />
    <div class="filters">
      <span class="filter-chip active" data-kind="all">All</span>
      <span class="filter-chip" data-kind="skill">Skills</span>
      <span class="filter-chip" data-kind="item">Items</span>
      <span class="filter-chip" data-kind="monster">Monsters</span>
    </div>
  </header>
  <div class="id-list" id="id-list"></div>
</div>
<div class="pack-col">
  <header>
    <div class="selected-info">
      <h2 id="sel-id">Pick a game id from the left</h2>
      <div class="selected-current" id="sel-current"></div>
    </div>
    <select id="pack-select">
      <option value="">— Choose a pack —</option>
    </select>
  </header>
  <div class="pack-grid" id="pack-grid"></div>
</div>
<div class="footer">
  <span id="change-count" class="changes">0 changes</span>
  <button id="export-btn">Export JSON</button>
  <button id="reset-btn" style="background:#3a4154;color:#dfe9ee">Reset</button>
</div>

const STORE_KEY = 'iconPicker:v1';

let picks = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
let selectedGameId = null;
let selectedPack = null;
let activeKind = 'all';
let filterText = '';

function urlPath(p){
  return p.split('/').map(encodeURIComponent).join('/');
}

function renderIdList(){
  const list = document.getElementById('id-list');
  const filtered = ID_LIST.filter(r => {
    if(activeKind !== 'all' && r.kind !== activeKind) return false;
    if(filterText && r.id.toLowerCase().indexOf(filterText) < 0) return false;
    return true;
  });
  list.innerHTML = filtered.map(r => {
    const current = picks[r.kind+':'+r.id] || r.current;
    const changed = picks[r.kind+':'+r.id] && picks[r.kind+':'+r.id] !== r.current;
    const isSelected = selectedGameId === r.kind+':'+r.id;
    return `<div class="id-row ${isSelected?'selected':''} ${changed?'changed':''}" data-id="${r.kind+':'+r.id}">
      <div class="ir-icon"><img src="${urlPath(current)}" alt="" /></div>
      <div class="ir-meta">
        <div class="ir-name">${r.id}</div>
        <div class="ir-kind">${r.kind}</div>
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.id-row').forEach(el => el.onclick = () => {
    selectedGameId = el.dataset.id;
    renderIdList();
    renderPackHeader();
  });
  document.getElementById('stats').textContent =
    `${ID_LIST.length} ids · ${Object.keys(picks).length} customised · ${filtered.length} shown`;
  document.getElementById('change-count').textContent = `${Object.keys(picks).length} changes`;
}

function renderPackHeader(){
  if(!selectedGameId){ document.getElementById('sel-id').textContent = 'Pick a game id from the left'; document.getElementById('sel-current').textContent = ''; return; }
  const [kind, id] = selectedGameId.split(':');
  const row = ID_LIST.find(r => r.kind === kind && r.id === id);
  if(!row) return;
  const current = picks[selectedGameId] || row.current;
  document.getElementById('sel-id').textContent = `${id} (${kind})`;
  document.getElementById('sel-current').innerHTML = `Current: <code style="color:#7de6d4">${current}</code>`;
  // Try to auto-select the pack the current icon is in
  const m = current.match(/raw-bundle\/([^\/]+)\//);
  if(m && PACK_DATA[m[1]]){
    document.getElementById('pack-select').value = m[1];
    selectedPack = m[1];
    renderPackGrid();
  }
}

function renderPackSelect(){
  const sel = document.getElementById('pack-select');
  const opts = ['<option value="">— Choose a pack —</option>'];
  Object.keys(PACK_DATA).sort().forEach(slug => {
    opts.push(`<option value="${slug}">${slug} (${PACK_DATA[slug].length} cells)</option>`);
  });
  sel.innerHTML = opts.join('');
  sel.onchange = e => { selectedPack = e.target.value; renderPackGrid(); };
}

function renderPackGrid(){
  const grid = document.getElementById('pack-grid');
  if(!selectedPack){ grid.innerHTML = '<div style="color:#9aa3b0;padding:20px">Choose a pack to browse its cells.</div>'; return; }
  const cells = PACK_DATA[selectedPack];
  const current = selectedGameId ? (picks[selectedGameId] || ID_LIST.find(r => r.kind+':'+r.id === selectedGameId)?.current) : '';
  grid.innerHTML = cells.map(c => {
    const isCurrent = current === c.path;
    return `<div class="pcell ${isCurrent?'current':''}" data-path="${c.path}" title="${c.label}">
      <img src="${urlPath(c.path)}" alt="" />
      <div class="pl">${c.label}</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.pcell').forEach(el => el.onclick = () => {
    if(!selectedGameId){ alert('Pick a game id from the left first.'); return; }
    picks[selectedGameId] = el.dataset.path;
    localStorage.setItem(STORE_KEY, JSON.stringify(picks));
    renderIdList();
    renderPackHeader();
    renderPackGrid();
  });
}

document.getElementById('filter').oninput = e => { filterText = e.target.value.toLowerCase(); renderIdList(); };
document.querySelectorAll('.filter-chip').forEach(c => c.onclick = e => {
  document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  activeKind = c.dataset.kind;
  renderIdList();
});

document.getElementById('export-btn').onclick = () => {
  const out = { skill:{}, item:{}, monster:{} };
  Object.entries(picks).forEach(([k, v]) => {
    const [kind, id] = k.split(':');
    out[kind][id] = v;
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'icon-picks.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
};

document.getElementById('reset-btn').onclick = () => {
  if(confirm('Discard all unsaved picks?')){
    picks = {};
    localStorage.removeItem(STORE_KEY);
    renderIdList(); renderPackHeader(); renderPackGrid();
  }
};

// Boot
renderPackSelect();
renderIdList();
renderPackGrid();
</script>
</body></html>
