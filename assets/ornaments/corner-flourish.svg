<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Decorative corner flourish">
  <g fill="none" stroke="#9c6d22" stroke-width="1.5" stroke-linecap="round">
    <!-- Outer L corner bracket -->
    <path d="M2 60 L2 2 L60 2"/>
    <!-- Inner detail: sweeping curl -->
    <path d="M2 32 Q12 22 22 22 Q32 22 32 32 Q32 42 22 42" stroke-width="1.3"/>
    <!-- Acanthus leaf on the curl -->
    <path d="M22 42 Q26 46 30 42 Q34 38 30 34" stroke-width="1.1"/>
    <!-- Tiny terminal flourish -->
    <circle cx="32" cy="32" r="2" fill="#c8862a" stroke="none"/>
    <!-- Second sweeping curl on the other axis -->
    <path d="M32 2 Q22 12 22 22 Q22 32 32 32" stroke-width="1.3"/>
    <!-- Trefoil terminus along outer corner -->
    <path d="M2 2 Q-1 -1 -1 -1" stroke-width="0"/>
    <circle cx="6" cy="6" r="1.6" fill="#c8862a" stroke="none"/>
    <!-- Decorative dots along the brackets -->
    <circle cx="50" cy="2" r="1" fill="#9c6d22" stroke="none"/>
    <circle cx="2" cy="50" r="1" fill="#9c6d22" stroke="none"/>
    <circle cx="40" cy="2" r="0.8" fill="#c8862a" stroke="none"/>
    <circle cx="2" cy="40" r="0.8" fill="#c8862a" stroke="none"/>
  </g>
</svg>
